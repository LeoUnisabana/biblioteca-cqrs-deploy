apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "biblioteca-cqrs.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "biblioteca-cqrs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "biblioteca-cqrs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "biblioteca-cqrs.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- if .Values.newrelic.enabled }}
      initContainers:
        - name: newrelic-agent-downloader
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              echo "Descargando New Relic Java Agent..."
              wget -q {{ .Values.newrelic.agent.downloadUrl }} -O /tmp/newrelic-java.zip
              unzip -q /tmp/newrelic-java.zip -d /opt/newrelic
              echo "New Relic Agent descargado exitosamente"
              ls -la /opt/newrelic/newrelic/
          volumeMounts:
            - name: newrelic-agent
              mountPath: /opt/newrelic
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "biblioteca-cqrs.fullname" . }}-config
            - secretRef:
                name: {{ include "biblioteca-cqrs.fullname" . }}-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.newrelic.enabled }}
          volumeMounts:
            - name: newrelic-agent
              mountPath: /opt/newrelic
          {{- end }}
      {{- if .Values.newrelic.enabled }}
      volumes:
        - name: newrelic-agent
          emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
