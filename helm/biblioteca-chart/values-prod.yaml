# ==========================================
# VALORES PARA AMBIENTE DE PRODUCCION
# ==========================================

replicaCount: 3

image:
  repository: leounisabana/biblioteca-cqrs
  tag: 1.0.2
  pullPolicy: IfNotPresent

# Service tipo LoadBalancer en producción (expuesto externamente)
service:
  type: LoadBalancer
  annotations:
    # Ejemplo para cloud providers
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # cloud.google.com/load-balancer-type: "Internal"

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 2Gi

# HPA con más agresividad
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# PostgreSQL con más recursos (o usar BD externa)
postgresql:
  enabled: true
  persistence:
    size: 10Gi
    storageClass: fast-ssd  # Ajustar según cloud provider
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  auth:
    # EN PRODUCCIÓN: Usar secrets externos, no hardcodear
    database: biblioteca_db
    username: biblioteca_user
    # password debe venir de Secret externo

# New Relic con labels de producción
newrelic:
  enabled: true
  appName: biblioteca-cqrs-prod
  labels: "Environment:production;Team:arquitectura;Project:biblioteca;Critical:true"
  # EN PRODUCCIÓN: licenseKey debe venir de Secret externo

# Variables de entorno para producción
env:
  SPRING_PROFILES_ACTIVE: prod
  LOGGING_LEVEL_ROOT: WARN
  LOGGING_LEVEL_COM_BIBLIOTECA: INFO
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: when_authorized

# Probes más tolerantes en producción
livenessProbe:
  initialDelaySeconds: 90
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 5

readinessProbe:
  initialDelaySeconds: 85
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

# Distribución de pods en diferentes nodos
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - biblioteca-cqrs
          topologyKey: kubernetes.io/hostname
