# Secret para autenticación en GitHub (repositorio privado)
# 
# INSTRUCCIONES:
# 1. Genera un Personal Access Token (PAT) en GitHub:
#    - Ve a: https://github.com/settings/tokens
#    - Click en "Generate new token (classic)"
#    - Selecciona scope: repo (todos los permisos de repositorio)
#    - Copia el token generado
#
# 2. Reemplaza <TU_GITHUB_USERNAME> y <TU_PERSONAL_ACCESS_TOKEN> abajo
#
# 3. Aplica este secret:
#    kubectl apply -f argocd/repo-secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: biblioteca-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
type: Opaque
stringData:
  # Tipo de repositorio (git)
  type: git
  
  # URL del repositorio (HTTPS)
  url: https://github.com/LeoUnisabana/biblioteca-cqrs-deploy
  
  # Usuario de GitHub
  username: <TU_GITHUB_USERNAME>
  
  # Personal Access Token de GitHub (reemplazar)
  password: <TU_PERSONAL_ACCESS_TOKEN>
  
  # Opcional: si quieres usar SSH en lugar de HTTPS, usa esto:
  # sshPrivateKey: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   <TU_CLAVE_PRIVADA_SSH>
  #   -----END OPENSSH PRIVATE KEY-----
